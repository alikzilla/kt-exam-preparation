<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f0e7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#12100d" media="(prefers-color-scheme: dark)" />
    <title>КТ Подготовка — Магистратура М094</title>

    <!-- Шрифты «Academic Ink» с поддержкой кириллицы. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Unbounded:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Применяем тему до первой отрисовки, чтобы избежать мигания.
      (function () {
        try {
          var stored = localStorage.getItem("kt-exam:theme") || "system";
          var dark =
            stored === "dark" ||
            (stored === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
